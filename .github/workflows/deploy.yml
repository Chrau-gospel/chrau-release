# Deploy static content to gh-pages branch
name: Deploy static content to gh-pages

on:
  # Gitea CI pushes dist.tar.gz to main — Pages API only allows deploy from main (not tag ref)
  push:
    branches:
      - main
    paths:
      - dist.tar.gz

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract web assets
        run: tar -xzvf dist.tar.gz
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          cname: chrau.54vn.us
          force_orphan: true
